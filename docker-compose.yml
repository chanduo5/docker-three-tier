version: "3.9"

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  mysql_data:   # Persists MySQL data across container restarts/rebuilds

# ── Custom bridge network ──────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # ── 1. MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    networks:
      - app_network
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql          # named volume → data survives restarts
    ports:
      - "3306:3306"                        # optional: expose for local debugging
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s      # check every 10 s
      timeout: 5s        # fail if no response in 5 s
      retries: 5         # mark unhealthy after 5 consecutive failures
      start_period: 30s  # give MySQL time to initialise before first check
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── 2. Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    restart: unless-stopped
    networks:
      - app_network
    environment:
      PORT:        ${BACKEND_PORT:-3000}
      DB_HOST:     mysql            # service name = hostname on app_network
      DB_PORT:     3306
      DB_USER:     ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME:     ${MYSQL_DATABASE}
    # ⚠️  STRICT: backend only starts AFTER mysql passes its health check
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── 3. Frontend (Nginx) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_nginx
    restart: unless-stopped
    networks:
      - app_network
    environment:
      # envsubst uses this to fill nginx.conf.template at container startup
      BACKEND_URL: http://backend:${BACKEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy  # wait for backend to be healthy first
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"